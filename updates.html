<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Updates</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6D4BC3',
                        secondary: '#8A63D2',
                        accent: '#F05A4A',
                        sun: '#F8C600',
                        dark: '#1F2937',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="icon" href="assets/images/logo.webp">


</head>

<body class="bg-gray-100">

    <!-- Header -->
    <div id="header-placeholder"></div>

    <div class="pt-36"></div>


    <!-- Document -->
    <!-- Updates -->
    <div class="max-w-5xl mx-auto px-6 mb-16">

        <!-- Header -->
        <div class="bg-primary text-white rounded-t-2xl px-8 py-5 shadow-lg">

            <h2 class="text-3xl font-bold">
                📢 Latest Announcements
            </h2>

            <p class="text-white/80 mt-1">
                Stay updated with our latest activities, workshops and events.
            </p>

        </div>

        <!-- Scroll Area -->
        <div class="bg-white rounded-b-2xl shadow-lg h-[650px] overflow-y-auto p-8">

            <div id="updatesContent" class="space-y-8">

                Loading updates...

            </div>

        </div>

    </div>

    <script>

        fetch("updates.txt")
            .then(response => response.text())
            .then(text => {

                const container = document.getElementById("updatesContent");

                container.innerHTML = "";

                // Split updates by ======
                const updates = text.split("========================================");

                updates.forEach(update => {

                    update = update.trim();

                    if (update === "") return;

                    let date = "";
                    let title = "";
                    let description = "";

                    let buttons = [];

                    const lines = update.split("\n");

                    let readingDescription = false;

                    lines.forEach(line => {

                        line = line.trim();

                        if (line.startsWith("Date:")) {

                            date = line.replace("Date:", "").trim();
                            readingDescription = false;

                        }

                        else if (line.startsWith("Title:")) {

                            title = line.replace("Title:", "").trim();
                            readingDescription = false;

                        }

                        else if (line.startsWith("Description:")) {

                            readingDescription = true;

                        }

                        else if (line.startsWith("Button:")) {

                            readingDescription = false;

                            const data = line.replace("Button:", "").trim();

                            const parts = data.split("|");

                            if (parts.length === 2) {

                                buttons.push({

                                    text: parts[0].trim(),

                                    link: parts[1].trim()

                                });

                            }

                        }

                        else if (readingDescription && line !== "") {

                            description += line + "<br>";

                        }

                    });

                    let buttonsHTML = "";

                    buttons.forEach(btn => {

                        buttonsHTML += `
                    <a href="${btn.link}"
                       target="_blank"
                       class="inline-block bg-primary hover:bg-secondary text-white px-5 py-2 rounded-lg transition mr-3 mt-3">
                        ${btn.text}
                    </a>
                `;

                    });

                    container.innerHTML += `

                <div class="border rounded-2xl shadow-md p-6 hover:shadow-xl transition">

                    <p class="text-sm text-gray-500 mb-2">

                        📅 ${date}

                    </p>

                    <h2 class="text-2xl font-bold text-primary mb-4">

                        ${title}

                    </h2>

                    <p class="text-gray-700 leading-8">

                        ${description}

                    </p>

                    ${buttonsHTML}

                </div>

            `;

                });

            });

    </script>

    <script src="assets/js/includes.js"></script>

    <script src="assets/js/main.js"></script>

    <script src="assets/js/menu.js"></script>

    <script src="assets/js/animations.js"></script>

    <script src="assets/js/seo.js"></script>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

</body>

</html>
